<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUSC O'Week — House Scores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./stye.css">
</head>
<body>
<div class="flash" id="flash"></div>
<div class="banner" id="banner">MAX HYPE!</div>
<canvas id="confetti"></canvas>

<div class="wrap">
    <header>
        <h1 class="title">NUSC O'Week</h1>
        <p class="subtitle">House Scores</p>
    </header>

    <!-- Liveliness meter (the hero) -->
    <section class="meter" id="meter" aria-label="Liveliness meter">
        <div class="meter-head">
            <div class="meter-label"><span class="pulse-dot"></span> Liveliness Meter</div>
            <div class="meter-readout"><b id="meterNow">0</b> / <span id="meterTarget">1000</span></div>
        </div>
        <div class="track">
            <div class="fill" id="fill"></div>
            <div class="threshold" id="thresholdMark"><span>TARGET</span></div>
        </div>
    </section>

    <!-- Total -->
    <section class="total">
        <div class="label">Total</div>
        <div class="value" id="totalValue">0</div>
    </section>

    <!-- House cards -->
    <main class="grid" id="grid"></main>
</div>
