<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUSC OWeek - House Scores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./stye.css" />
</head>
<body>
<div class="flash" id="flash"></div>
<div class="banner" id="banner">MAX HYPE!</div>
<canvas id="confetti"></canvas>

<div class="wrap">
    <header>
        <h1 class="title">NUSC OWeek</h1>
        <p class="subtitle">House Scores</p>
    </header>

    <section class="ollie" aria-label="Ollie clarity progress">
        <div class="ollie-copy">
            <div class="eyebrow">Ollie Charge</div>
            <h2>Ollie gets clearer as the meter fills</h2>
            <div class="ollie-readout"><span id="olliePercent">0%</span> clear</div>
        </div>
        <div class="ollie-stage" id="ollieStage">
            <img class="ollie-img" id="ollieImage" alt="Ollie the otter mascot" />
            <div class="ollie-glow" aria-hidden="true"></div>
        </div>
    </section>

    <section class="meter" id="meter" aria-label="Liveliness meter">
        <div class="meter-head">
            <div class="meter-label"><span class="pulse-dot"></span> Liveliness Meter</div>
            <div class="meter-readout"><b id="meterNow">0</b> / <span id="meterTarget">1000</span></div>
        </div>
        <div class="track" id="track">
            <div class="fill" id="fill"></div>
            <div class="ridge" style="left: 20%"></div>
            <div class="ridge" style="left: 40%"></div>
            <div class="ridge" style="left: 60%"></div>
            <div class="ridge" style="left: 80%"></div>
            <div class="threshold"><span>TARGET</span></div>
        </div>
    </section>

    <section class="total">
        <div>
            <div class="label">Total</div>
            <div class="connection" id="connectionStatus">Connecting...</div>
        </div>
        <div class="value" id="totalValue">0</div>
    </section>

    <main class="grid" id="grid"></main>
</div>

<button class="admin-toggle" id="adminToggle" type="button" title="Score controls">Controls</button>
<section class="admin" id="adminPanel" aria-label="Score controls">
    <h2>Score Controls</h2>
    <form id="scoreForm">
        <label>Username <input id="usernameInput" name="username" value="your_telegram_username" autocomplete="off" /></label>
        <label>House
            <select id="teamInput" name="team">
                <option value="Corvex">Corvex</option>
                <option value="Osceanna">Osceanna</option>
                <option value="Idalia">Idalia</option>
                <option value="Levios">Levios</option>
                <option value="Kairos">Kairos</option>
                <option value="Perseus">Perseus</option>
            </select>
        </label>
        <label>Points <input id="deltaInput" name="delta" type="number" value="35" step="1" /></label>
        <button type="submit">Add points</button>
    </form>
    <button type="button" id="undoBtn">Undo latest</button>
    <p id="adminMessage"></p>
</section>

<script src="./script.js"></script>
</body>
</html>
